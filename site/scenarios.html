<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenarios — AI Preparedness Tracker</title>
  <meta name="description" content="All transformative AI scenarios evaluated for likelihood, impact, and preparedness.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">AI Preparedness <span>Tracker</span></a>
      <nav class="site-nav">
        <a href="scenarios.html" class="active">Scenarios</a>
        <a href="policies.html">Policies</a>
        <a href="methodology.html">Methodology</a>
        <a href="https://github.com/brandonjackson/aiscenariosplatform" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="scenarios-hero">
    <div class="container">
      <h1 class="section-title scenarios-headline"><span class="headline-green" id="scenario-count-headline"></span> worth taking seriously. Rated by experts. Tracked in real time.</h1>
    </div>
  </section>

  <!-- Scenario Cards -->
  <section class="scenarios-list-section">
    <div class="container">
      <div class="filter-bar">
        <input type="text" id="filter-search" class="filter-search" placeholder="Search scenarios...">
        <select id="filter-tag" class="filter-select">
          <option value="">All Challenges</option>
          <option value="mass_unemployment">Mass Unemployment</option>
          <option value="fiscal_crisis">Fiscal Crisis</option>
          <option value="inequality">Inequality</option>
          <option value="ai_concentration">AI Concentration</option>
          <option value="skills_obsolescence">Skills Obsolescence</option>
          <option value="public_service_disruption">Public Service Disruption</option>
          <option value="democratic_erosion">Democratic Erosion</option>
          <option value="existential_risk">Existential Risk</option>
        </select>
        <select id="filter-sort" class="filter-select">
          <option value="likelihood">Sort by Likelihood</option>
          <option value="impact">Sort by Impact</option>
          <option value="preparedness">Sort by Preparedness</option>
          <option value="title">Sort by Title</option>
        </select>
      </div>
      <div class="scenario-cards-grid" id="scenario-cards-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <span>&copy; 2026 AI Preparedness Tracker. Data-driven AI preparedness tracking.</span>
        <div class="footer-links">
          <a href="https://github.com/brandonjackson/aiscenariosplatform" target="_blank" rel="noopener">Source</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
  (function() {
    'use strict';

    let data = null;

    // --- Color helpers ---
    function getPreparednessLabel(score) {
      if (score < 1.8) return 'Critically Unprepared';
      if (score < 2.6) return 'Highly Unprepared';
      if (score < 3.4) return 'Unprepared';
      if (score < 4.2) return 'Almost Prepared';
      return 'Prepared';
    }

    function getPreparednessColor(score) {
      if (score < 1.8) return '#000000';
      if (score < 2.6) return '#c0392b';
      if (score < 3.4) return '#e67e22';
      if (score < 4.2) return '#f1c40f';
      return '#27ae60';
    }

    function getImpactLabel(score) {
      if (score < 1.8) return 'Systemic Risk';
      if (score < 2.6) return 'Broken for All';
      if (score < 3.4) return 'Broken for Some';
      if (score < 4.2) return 'Stable';
      return 'Improving';
    }

    function getImpactColor(score) {
      return getPreparednessColor(score);
    }

    function getLikelihoodLabel(score) {
      if (score < 1.8) return 'Improbable';
      if (score < 2.6) return 'Possible';
      if (score < 3.4) return 'Plausible';
      if (score < 4.2) return 'Probable';
      return 'Emerging';
    }

    function getLikelihoodColor(score) {
      if (score < 1.8) return '#cccccc';
      if (score < 2.6) return '#aaaaaa';
      if (score < 3.4) return '#888888';
      if (score < 4.2) return '#666666';
      return '#444444';
    }

    function makeBadge(label, bgColor, textColor) {
      return '<span class="score-badge" style="background:' + bgColor + ';color:' + textColor + ';border:1px solid #fff;border-radius:5px;">' + label + '</span>';
    }

    function likelihoodBadge(score) {
      return makeBadge(getLikelihoodLabel(score), getLikelihoodColor(score), '#fff');
    }

    function impactBadge(score) {
      return makeBadge(getImpactLabel(score), getImpactColor(score), '#fff');
    }

    function preparednessBadge(score) {
      return makeBadge(getPreparednessLabel(score), getPreparednessColor(score), '#fff');
    }

    function formatTag(tag) {
      return tag.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.slice(0, len) + '...' : str;
    }

    // --- Scenario Cards ---
    function renderScenarioCards() {
      var grid = document.getElementById('scenario-cards-grid');
      if (!grid || !data) return;

      var searchInput = document.getElementById('filter-search');
      var tagSelect = document.getElementById('filter-tag');
      var sortSelect = document.getElementById('filter-sort');
      var searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
      var selectedTag = tagSelect ? tagSelect.value : '';
      var sortBy = sortSelect ? sortSelect.value : 'likelihood';

      var scenarios = data.scenarios.filter(function(s) { return s.evaluation; });

      // Apply search filter
      if (searchTerm) {
        scenarios = scenarios.filter(function(s) {
          return s.title.toLowerCase().includes(searchTerm) ||
            s.institution.toLowerCase().includes(searchTerm) ||
            s.authors.toLowerCase().includes(searchTerm) ||
            s.summary.toLowerCase().includes(searchTerm);
        });
      }

      // Apply tag filter
      if (selectedTag) {
        scenarios = scenarios.filter(function(s) { return s.tags.includes(selectedTag); });
      }

      // Sort
      if (sortBy === 'likelihood') {
        scenarios.sort(function(a, b) { return b.evaluation.likelihood - a.evaluation.likelihood; });
      } else if (sortBy === 'impact') {
        scenarios.sort(function(a, b) { return a.evaluation.impact - b.evaluation.impact; });
      } else if (sortBy === 'preparedness') {
        scenarios.sort(function(a, b) { return a.evaluation.preparedness - b.evaluation.preparedness; });
      } else if (sortBy === 'title') {
        scenarios.sort(function(a, b) { return a.title.localeCompare(b.title); });
      }

      if (scenarios.length === 0) {
        grid.innerHTML = '<p class="no-results">No scenarios match your filters.</p>';
        return;
      }

      grid.innerHTML = scenarios.map(function(s) {
        var ev = s.evaluation;
        var prepPct = Math.round(((ev.preparedness - 1) / 4) * 100);
        var prepColor = getPreparednessColor(ev.preparedness);

        // Get relevant challenge tags
        var tagBadges = s.tags.slice(0, 4).map(function(tag) {
          return '<span class="scenario-card-tag">' + formatTag(tag) + '</span>';
        }).join('');

        // Find relevant policies
        var relevantPolicies = data.policies
          .filter(function(p) { return s.tags.includes(p.challengeTag); })
          .slice(0, 3);
        var policyLinks = relevantPolicies.map(function(p) {
          return '<a href="policy.html#' + p.id + '" class="policy-tag">' + p.name + '</a>';
        }).join('');

        return '<a href="scenario.html#' + s.id + '" class="scenario-card">' +
          '<div class="scenario-card-header">' +
            '<h3 class="scenario-card-title">' + s.title + '</h3>' +
            '<div class="scenario-card-meta">' + s.authors + ' &middot; ' + s.institution + ' &middot; ' + s.year + '</div>' +
          '</div>' +
          '<p class="scenario-card-summary">' + truncate(s.summary, 180) + '</p>' +
          '<div class="scenario-card-tags">' + tagBadges + '</div>' +
          '<div class="scenario-card-metrics">' +
            '<div class="scenario-card-metric">' +
              '<span class="scenario-card-metric-label">Likelihood</span>' +
              likelihoodBadge(ev.likelihood) +
            '</div>' +
            '<div class="scenario-card-metric">' +
              '<span class="scenario-card-metric-label">Impact</span>' +
              impactBadge(ev.impact) +
            '</div>' +
            '<div class="scenario-card-metric">' +
              '<span class="scenario-card-metric-label">Preparedness</span>' +
              '<div class="preparedness-bar-container">' +
                '<div class="preparedness-bar">' +
                  '<div class="preparedness-bar-fill" style="width:' + prepPct + '%;background-color:' + prepColor + ';"></div>' +
                '</div>' +
                preparednessBadge(ev.preparedness) +
              '</div>' +
            '</div>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    // --- Init ---
    async function init() {
      try {
        var response = await fetch('data.json');
        data = await response.json();
      } catch (err) {
        console.error('Failed to load data.json:', err);
        return;
      }

      // Populate headline with scenario count
      var scenarioCount = data.scenarios.filter(function(s) { return s.evaluation; }).length;
      var headlineEl = document.getElementById('scenario-count-headline');
      if (headlineEl) {
        headlineEl.textContent = scenarioCount + ' economic futures';
      }

      renderScenarioCards();

      // Filters
      var searchInput = document.getElementById('filter-search');
      var tagSelect = document.getElementById('filter-tag');
      var sortSelect = document.getElementById('filter-sort');
      if (searchInput) searchInput.addEventListener('input', renderScenarioCards);
      if (tagSelect) tagSelect.addEventListener('change', renderScenarioCards);
      if (sortSelect) sortSelect.addEventListener('change', renderScenarioCards);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
