<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policy Atlas — AI Preparedness Tracker</title>
  <meta name="description" content="Policy proposals and challenge areas for transformative AI preparedness.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">AI Preparedness <span>Tracker</span></a>
      <nav class="site-nav">
        <a href="scenarios.html">Scenarios</a>
        <a href="policies.html" class="active">Policies</a>
        <a href="methodology.html">Methodology</a>
        <a href="https://github.com/brandonjackson/aiscenariosplatform" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <!-- Policies Hero -->
  <section class="policies-hero">
    <div class="container">
      <div class="policies-hero-inner">
        <h1 class="hero-title">AI progress is accelerating. But <span id="policies-hero-count" class="hero-rating-value rating-critically-unprepared">...</span> policy challenges remain unsolved.</h1>
      </div>
    </div>
  </section>

  <!-- Challenges Overview -->
  <section class="challenges-section">
    <div class="container">
      <div class="section-label">Challenges</div>
      <h2 class="section-title">Policy Challenge Areas</h2>
      <div class="challenges-grid" id="challenges-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- All Policies -->
  <section class="all-policies-section">
    <div class="container">
      <div class="section-label">All Policies</div>
      <h2 class="section-title">Policy Proposals</h2>
      <div class="filter-bar">
        <input type="text" id="policy-filter-search" class="filter-search" placeholder="Search policies...">
        <select id="policy-filter-tag" class="filter-select">
          <option value="">All Challenges</option>
        </select>
      </div>
      <div class="policy-list" id="policy-list">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <span>&copy; 2026 AI Preparedness Tracker. Data-driven AI preparedness tracking.</span>
        <div class="footer-links">
          <a href="https://github.com/brandonjackson/aiscenariosplatform" target="_blank" rel="noopener">Source</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
  (function() {
    'use strict';

    let data = null;

    // --- Color helpers ---
    function getPreparednessLabel(score) {
      if (score < 1.8) return 'Critically Unprepared';
      if (score < 2.6) return 'Highly Unprepared';
      if (score < 3.4) return 'Unprepared';
      if (score < 4.2) return 'Almost Prepared';
      return 'Prepared';
    }

    function getPreparednessColor(score) {
      if (score < 1.8) return '#000000';
      if (score < 2.6) return '#c0392b';
      if (score < 3.4) return '#e67e22';
      if (score < 4.2) return '#f1c40f';
      return '#27ae60';
    }

    function formatTag(tag) {
      return tag.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function makeBadge(label, bgColor, textColor) {
      return '<span class="score-badge" style="background:' + bgColor + ';color:' + textColor + ';border:1px solid #fff;border-radius:5px;">' + label + '</span>';
    }

    function preparednessBadge(score) {
      return makeBadge(getPreparednessLabel(score), getPreparednessColor(score), '#fff');
    }

    // --- Policies Hero ---
    function renderPoliciesHero() {
      const countEl = document.getElementById('policies-hero-count');
      if (!countEl || !data || !data.challenges) return;

      // Count challenges that are critically unprepared (preparedness < 1.8)
      const criticalCount = data.challenges.filter(function(c) {
        return c.preparedness !== null && c.preparedness < 1.8;
      }).length;

      countEl.textContent = criticalCount;
    }

    // --- Challenges Grid ---
    function renderChallengesGrid() {
      const grid = document.getElementById('challenges-grid');
      if (!grid || !data || !data.challenges) return;

      grid.innerHTML = data.challenges.map(function(c) {
        const color = c.preparedness !== null ? getPreparednessColor(c.preparedness) : '#999';
        const policyCount = data.policies.filter(function(p) { return p.challengeTag === c.tag; }).length;
        return '<a href="challenge.html#' + c.id + '" class="challenge-card" style="border-left: 4px solid ' + color + ';">' +
          '<div class="challenge-card-header">' +
            '<h3 class="challenge-card-title">' + c.opportunityName + '</h3>' +
            (c.preparedness !== null ? preparednessBadge(c.preparedness) : '') +
          '</div>' +
          '<p class="challenge-card-desc">' + c.description + '</p>' +
          '<div class="challenge-card-meta">' +
            '<span>' + c.scenarioCount + ' scenarios</span>' +
            '<span>' + policyCount + ' policies</span>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    // --- Policies List ---
    function renderPoliciesList() {
      const list = document.getElementById('policy-list');
      const searchInput = document.getElementById('policy-filter-search');
      const tagSelect = document.getElementById('policy-filter-tag');
      if (!list || !data) return;

      const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
      const selectedTag = tagSelect ? tagSelect.value : '';

      let policies = data.policies;

      if (searchTerm) {
        policies = policies.filter(function(p) {
          return p.name.toLowerCase().includes(searchTerm) ||
            p.description.toLowerCase().includes(searchTerm) ||
            p.challengeTag.toLowerCase().includes(searchTerm);
        });
      }
      if (selectedTag) {
        policies = policies.filter(function(p) { return p.challengeTag === selectedTag; });
      }

      if (policies.length === 0) {
        list.innerHTML = '<p class="no-results">No policies match your filters.</p>';
        return;
      }

      list.innerHTML = policies.map(function(p) {
        const citationsHtml = p.citations.map(function(c) {
          return '<a href="' + c.url + '" class="policy-citation" target="_blank" rel="noopener">' + c.text + '</a>';
        }).join('');

        return '<div class="policy-detail-card">' +
          '<div class="policy-detail-name"><a href="policy.html#' + p.id + '">' + p.name + '</a></div>' +
          '<div class="policy-detail-tag">' + formatTag(p.challengeTag) + '</div>' +
          '<p class="policy-detail-desc">' + p.description + '</p>' +
          (citationsHtml ? '<div class="policy-detail-citations">' + citationsHtml + '</div>' : '') +
        '</div>';
      }).join('');
    }

    // --- Populate filter dropdown ---
    function populateFilterDropdown() {
      const tagSelect = document.getElementById('policy-filter-tag');
      if (!tagSelect || !data || !data.challenges) return;

      data.challenges.forEach(function(c) {
        const opt = document.createElement('option');
        opt.value = c.tag;
        opt.textContent = c.opportunityName;
        tagSelect.appendChild(opt);
      });
    }

    // --- Init ---
    async function init() {
      try {
        const response = await fetch('data.json');
        data = await response.json();
      } catch (err) {
        console.error('Failed to load data.json:', err);
        return;
      }

      renderPoliciesHero();
      renderChallengesGrid();
      populateFilterDropdown();
      renderPoliciesList();

      // Bind filters
      var searchInput = document.getElementById('policy-filter-search');
      var tagSelect = document.getElementById('policy-filter-tag');
      if (searchInput) searchInput.addEventListener('input', renderPoliciesList);
      if (tagSelect) tagSelect.addEventListener('change', renderPoliciesList);

    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
